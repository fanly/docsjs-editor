name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.1.1)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Use latest npm
        run: npm i -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Debug version
        run: echo "Publishing version ${{ steps.version.outputs.VERSION }}"

      - name: Validate tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Publish (Trusted Publisher with token fallback)
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          set +e
          npm publish --provenance --access public 2>&1 | tee /tmp/npm-publish.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "npm error code E404" /tmp/npm-publish.log && [ -n "${NPM_TOKEN:-}" ]; then
            echo "Trusted Publisher not active for this package yet; retrying with NPM_TOKEN bootstrap publish."
            printf "//registry.npmjs.org/:_authToken=%s\n" "$NPM_TOKEN" > "$HOME/.npmrc"
            npm publish --access public
            exit 0
          fi

          exit "$status"
